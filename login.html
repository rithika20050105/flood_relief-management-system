<!DOCTYPE html>
<html>

<head>
<title>Login</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#000000,#021b3a);
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

header{
    text-align:center;
    color:white;
    margin-bottom:20px;
}

header img{
    width:60px;
}

.container{
    background:rgba(0,0,0,0.6);
    padding:40px;
    width:300px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,140,255,0.5);
}

.container input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#0a2540;
    color:white;
}

.container input::placeholder{
    color:#aaa;
}

.container button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:linear-gradient(90deg,#0066ff,#00bfff);
    color:white;
    font-size:16px;
    cursor:pointer;
}

.container button:hover{
    opacity:0.9;
}

</style>

<script src="js/script.js"></script>

</head>

<body>

<header>

<h2>Login</h2>
</header>

<div class="container">

<form action="php/login.php" method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
