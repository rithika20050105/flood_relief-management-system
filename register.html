<!DOCTYPE html>
<html>

<head>

<title>User Registration</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#000000,#021b3a);
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
}

header{
text-align:center;
margin-bottom:20px;
}

header img{
width:70px;
margin-bottom:10px;
}

.container{
background:rgba(0,0,0,0.6);
padding:40px;
width:320px;
border-radius:15px;
text-align:center;
box-shadow:0 0 25px rgba(0,140,255,0.5);
}

.container input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#0a2540;
color:white;
font-size:14px;
}

.container input::placeholder{
color:#aaa;
}

.container button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#0066ff,#00bfff);
color:white;
font-size:16px;
cursor:pointer;
}

.container button:hover{
opacity:0.9;
}

</style>

<script src="js/script.js"></script>

</head>

<body>

<header>
<img src="usjp-logo.png">
<h2>User Registration</h2>
</header>

<div class="container">

<form action="php/register.php" method="POST" onsubmit="return validateForm()">

<input type="text" name="name" id="name" placeholder="Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

</div>

</body>
</html>
